<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>股票資料庫管理系統</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #121212; color: #e0e0e0; margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; background-color: #1e1e1e; padding: 30px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        h1 { color: #bb86fc; text-align: center; border-bottom: 2px solid #333; padding-bottom: 10px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; color: #03dac6; }
        input[type="text"], input[type="password"] { width: calc(100% - 20px); padding: 10px; border: 1px solid #333; border-radius: 5px; background-color: #2c2c2c; color: white; }
        button { background-color: #bb86fc; color: #000; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; }
        button:hover { background-color: #9965f4; }
        .status { margin-top: 20px; padding: 15px; border-radius: 5px; background-color: #2c2c2c; border-left: 4px solid #03dac6; }
        .hidden { display: none; }
        #message { margin-top: 15px; text-align: center; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h1>PostgreSQL 連線設定</h1>
        <div class="status">
            <p>目前資料庫狀態: <strong id="db-status">{{ db_status }}</strong></p>
        </div>
        <form id="config-form">
            <div class="form-group">
                <label for="db_user">使用者帳號 (User):</label>
                <input type="text" id="db_user" name="db_user" value="{{ config.get('db_user', 'postgres') }}">
            </div>
            <div class="form-group">
                <label for="db_password">密碼 (Password):</label>
                <input type="password" id="db_password" name="db_password" value="{{ config.get('db_password', '') }}">
            </div>
            <div class="form-group">
                <label for="db_host">主機位址 (Host):</label>
                <input type="text" id="db_host" name="db_host" value="{{ config.get('db_host', 'localhost') }}">
            </div>
            <div class="form-group">
                <label for="db_port">埠號 (Port):</label>
                <input type="text" id="db_port" name="db_port" value="{{ config.get('db_port', '5432') }}">
            </div>
            <div class="form-group">
                <label for="db_name">資料庫名稱 (Database Name):</label>
                <input type="text" id="db_name" name="db_name" value="{{ config.get('db_name', 'stock_db') }}">
            </div>
            <button type="button" onclick="saveConfig()">儲存設定並初始化資料庫</button>
        </form>
        <div id="message" class="hidden"></div>
    </div>

    <script>
        function saveConfig() {
            const formData = {
                db_user: document.getElementById('db_user').value,
                db_password: document.getElementById('db_password').value,
                db_host: document.getElementById('db_host').value,
                db_port: document.getElementById('db_port').value,
                db_name: document.getElementById('db_name').value
            };

            const msgDiv = document.getElementById('message');
            msgDiv.textContent = '正在設定中...';
            msgDiv.className = '';
            msgDiv.style.color = '#fff';

            fetch('/api/config', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(formData)
            })
            .then(response => response.json())
            .then(data => {
                msgDiv.textContent = data.message;
                if(data.success) {
                    msgDiv.style.color = '#03dac6';
                    document.getElementById('db-status').textContent = 'Connected & Initialized';
                    setTimeout(() => {
                        window.location.reload();
                    }, 2000);
                } else {
                    msgDiv.style.color = '#cf6679';
                    document.getElementById('db-status').textContent = 'Error';
                }
            })
            .catch(error => {
                msgDiv.textContent = '發生錯誤: ' + error;
                msgDiv.style.color = '#cf6679';
            });
        }
    </script>
</body>
</html>
